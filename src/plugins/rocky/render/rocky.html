{% extends "plugin.html" %}

{% block content %}
<div class="rocky-root">

    <!-- Starfield dots -->
    <div class="stars">
        {% for i in range(55) %}
        <div class="star" style="
            left:{{ (i * 37 + i * i * 3) % 100 }}%;
            top:{{ (i * 53 + i * 7) % 100 }}%;
            animation-delay:{{ (i * 0.3) % 4 }}s;
            width:{{ 1 + (i % 3) }}px;
            height:{{ 1 + (i % 3) }}px;
        "></div>
        {% endfor %}
    </div>

    <!-- Rocky — actual character portrait from Project Hail Mary -->
    <div class="rocky-portrait-wrap">
      {% if rocky_image_uri %}
      <img class="rocky-portrait" src="{{ rocky_image_uri }}" alt="Rocky">
      {% else %}
      <!-- Fallback ring if image missing -->
      <div class="rocky-portrait-fallback">🪐</div>
      {% endif %}
      <div class="rocky-portrait-glow"></div>
    </div>

    <!-- Main message area -->
    <div class="rocky-content">
        <div class="rocky-nameplate">
            <span class="rocky-dot">◆</span>
            ROCKY &nbsp;·&nbsp; ERIDIAN COMPANION
            <span class="rocky-dot">◆</span>
        </div>

        <div class="rocky-speech">
            <div class="speech-corner tl"></div>
            <div class="speech-corner tr"></div>
            <p class="rocky-message">{{ message }}</p>
            <div class="speech-corner bl"></div>
            <div class="speech-corner br"></div>
        </div>

        <div class="rocky-footer">
            🪐 &nbsp;·&nbsp; PROJECT HAIL MARY
        </div>
    </div>

</div>
{% endblock %}

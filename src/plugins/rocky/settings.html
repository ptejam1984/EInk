<style>
.rocky-chat-wrap { display:flex; flex-direction:column; gap:14px; }
.rocky-chat-log {
    height:320px; overflow-y:auto; border:1px solid var(--border-color);
    border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:10px;
    background:var(--bg-secondary);
}
.chat-bubble { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.55; }
.bubble-rocky {
    align-self:flex-start;
    background:linear-gradient(135deg,#1a0a00,#2d1500);
    border:1px solid #ff8c00; color:#ffd080;
    border-radius:14px 14px 14px 2px;
}
.bubble-rocky .rocky-label { font-size:11px; color:#ff8c00; font-weight:700; margin-bottom:4px; letter-spacing:.05em; }
.bubble-human {
    align-self:flex-end;
    background:var(--button-bg,#333); color:var(--text-primary);
    border-radius:14px 14px 2px 14px;
}
.rocky-typing { font-size:12px; color:#ff8c00; font-style:italic; min-height:18px; margin-top:4px; }
.rocky-input-row { display:flex; gap:8px; }
.rocky-input-row input {
    flex:1; padding:10px 14px; border-radius:8px;
    border:1px solid var(--border-color); background:var(--bg-secondary);
    color:var(--text-primary); font-size:14px;
}
.rocky-send-btn {
    padding:10px 20px; border-radius:8px; border:none;
    background:#ff8c00; color:#000; font-weight:700; cursor:pointer; font-size:14px;
    transition: opacity .15s;
}
.rocky-send-btn:disabled { opacity:.4; cursor:default; }
.rocky-auto-note {
    font-size:12px; color:var(--text-secondary);
    border-left:3px solid #ff8c0055; padding-left:10px; line-height:1.5;
}
</style>

<div class="rocky-chat-wrap">

    <!-- Chat log — Rocky speaks first automatically -->
    <div class="form-group">
        <label class="form-label">🪐 Chat with Rocky</label>
        <div class="rocky-chat-log" id="rockyChatLog"></div>
        <div class="rocky-typing" id="rockyTyping">Rocky is waking up... 🪐</div>
        <div class="rocky-input-row" style="margin-top:8px;">
            <input type="text" id="rockyUserInput"
                   placeholder="Say something to Rocky..."
                   onkeydown="if(event.key==='Enter' && !this.disabled)sendToRocky()"
                   disabled>
            <button type="button" class="rocky-send-btn" id="rockySendBtn"
                    onclick="sendToRocky()" disabled>Send</button>
        </div>
    </div>

    <p class="rocky-auto-note">
        Rocky picks his own mood every time the display refreshes — funny, emotional, or helpful,
        depending on the time of day. No settings needed.
    </p>

</div>

<script>
let chatHistory = [];

function appendBubble(role, text) {
    const log = document.getElementById('rockyChatLog');
    const div = document.createElement('div');
    div.className = 'chat-bubble ' + (role === 'rocky' ? 'bubble-rocky' : 'bubble-human');
    if (role === 'rocky') {
        div.innerHTML = '<div class="rocky-label">🪐 ROCKY</div>' + escHtml(text);
        chatHistory.push({ role: 'assistant', content: text });
    } else {
        div.textContent = text;
        chatHistory.push({ role: 'user', content: text });
    }
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setLoading(on) {
    document.getElementById('rockySendBtn').disabled = on;
    document.getElementById('rockyUserInput').disabled = on;
    document.getElementById('rockyTyping').textContent = on ? 'Rocky is thinking... 🪐' : '';
}

async function sendToRocky() {
    const input = document.getElementById('rockyUserInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    appendBubble('human', msg);
    setLoading(true);
    try {
        const res = await fetch('/api/rocky/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, history: chatHistory.slice(-12) })
        });
        const data = await res.json();
        appendBubble('rocky', data.error ? 'Is problem! ' + data.error : data.response);
    } catch(e) {
        appendBubble('rocky', 'Is bad! Network problem. Rocky not reach AI brain.');
    } finally {
        setLoading(false);
    }
}

// Rocky greets automatically when the page opens
async function rockyGreet() {
    try {
        const res = await fetch('/api/rocky/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: '', history: [] })
        });
        const data = await res.json();
        appendBubble('rocky', data.error ? 'Is problem! ' + data.error : data.response);
    } catch(e) {
        appendBubble('rocky', 'Ryland! Is good to see you, friend. Rocky is here. Yes-yes!');
    } finally {
        document.getElementById('rockyTyping').textContent = '';
        document.getElementById('rockySendBtn').disabled = false;
        document.getElementById('rockyUserInput').disabled = false;
        document.getElementById('rockyUserInput').focus();
    }
}

document.addEventListener('DOMContentLoaded', rockyGreet);
</script>
